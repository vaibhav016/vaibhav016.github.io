<header class="site-header">
  <nav class="nav-container">
    <a href="{{ '/' | relative_url }}" class="site-logo">{{ site.author.name }}</a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span class="hamburger"></span>
    </button>
    <div class="nav-links">
      {% for link in site.data.navigation %}
      <a href="{{ link.url | relative_url }}" class="nav-link{% if page.url == link.url %} active{% endif %}">{{ link.title }}</a>
      {% endfor %}
    </div>
    <div class="nav-social">
      {% include social.html %}
    </div>
  </nav>
</header>
